spring:
  application:
    name: healinghouse

  config:
    import: "optional:file:${hh_external_properties:}"

  datasource:
    url: jdbc:mysql://localhost:3306/healing_house_clinic?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: clinic_user
    password: StrongPass123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        #dialect: org.hibernate.dialect.MySQL8Dialect

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m

healinghouse:
  security:
    owner-password: ${HEALING_HOUSE_OWNER_PASSWORD:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%X{user:--}/%X{role:--}]){yellow} %clr(%-40.40logger{39}){cyan} : %msg%n%wEx"