<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Appointments')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-header mb-0">Appointments</h4>
        <a th:href="@{/appointments/new}" class="btn btn-hh btn-sm">
            <i class="bi bi-plus-lg me-1"></i>New Appointment
        </a>
    </div>

    <!-- Filters -->
    <form th:action="@{/appointments}" method="get" class="card shadow-sm mb-3">
        <input type="hidden" name="size" th:value="${appointments.size}"/>
        <div class="card-body py-2">
            <div class="row g-2 align-items-end">
                <div class="col-md-2 position-relative">
                    <label class="form-label small mb-1">Patient Name / Phone</label>
                    <input type="text" name="patientName" id="patientNameFilterInput"
                           class="form-control form-control-sm" autocomplete="off"
                           th:value="${selectedPatientName}" placeholder="Search patient…">
                    <div id="patientFilterSuggestions"
                         class="list-group position-absolute w-100 shadow-sm d-none"
                         style="z-index:1000; top:100%;"></div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Therapist</label>
                    <select name="therapistId" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option th:each="t : ${therapists}"
                                th:value="${t.id}" th:text="${t.fullName}"
                                th:selected="${t.id == selectedTherapistId}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">All</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}" th:text="${s}"
                                th:selected="${s.name() == selectedStatus}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">From</label>
                    <input type="date" name="dateFrom" class="form-control form-control-sm"
                           th:value="${selectedDateFrom}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small mb-1">To</label>
                    <input type="date" name="dateTo" class="form-control form-control-sm"
                           th:value="${selectedDateTo}">
                </div>
                <div class="col-md-2 d-flex gap-1">
                    <button type="submit" class="btn btn-sm btn-hh flex-fill">
                        <i class="bi bi-search"></i> Filter
                    </button>
                    <a th:href="@{/appointments}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-x"></i>
                    </a>
                </div>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date &amp; Time</th>
                            <th>Patient</th>
                            <th>Phone</th>
                            <th>Therapist</th>
                            <th class="text-end">Grand Total (₹)</th>
                            <th class="text-center">Payment</th>
                            <th class="text-center">Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${appointments.empty}">
                            <td colspan="9" class="text-center text-muted py-4">
                                No appointments found.
                            </td>
                        </tr>
                        <tr th:each="a, stat : ${appointments}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td class="text-nowrap"
                                th:text="${#temporals.format(a.appointmentDateTime, 'dd MMM yyyy, HH:mm')}">
                            </td>
                            <td th:text="${a.patient.fullName}"></td>
                            <td th:text="${a.patient.phone ?: '—'}"></td>
                            <td th:text="${a.therapist.fullName}"></td>
                            <td class="text-end fw-semibold">
                                <span th:text="${a.grandTotal != null} ? |₹ ${#numbers.formatDecimal(a.grandTotal, 1, 2)}| : '—'"></span>
                                <span th:if="${a.discounted}" class="badge bg-info text-dark ms-1" title="Discount applied">
                                    <i class="bi bi-tag-fill"></i>
                                </span>
                            </td>
                            <!-- Payment status badge -->
                            <td class="text-center">
                                <span th:switch="${a.paymentStatus}">
                                    <span th:case="'PAID'"    class="badge bg-success">Paid</span>
                                    <span th:case="'PARTIAL'" class="badge bg-warning text-dark">Partial</span>
                                    <span th:case="'UNPAID'"  class="badge bg-danger">Unpaid</span>
                                    <span th:case="*"         class="badge bg-light text-muted border">—</span>
                                </span>
                            </td>
                            <td class="text-center">
                                <span class="badge"
                                      th:text="${a.status}"
                                      th:classappend="${a.status.name() == 'COMPLETED'} ? 'bg-success' :
                                                      (${a.status.name() == 'CANCELLED'}  ? 'bg-danger'  :
                                                      (${a.status.name() == 'NO_SHOW'}    ? 'bg-warning text-dark' :
                                                                                            'bg-primary'))">
                                </span>
                            </td>
                            <td class="text-center text-nowrap">
                                <!-- View -->
                                <a th:href="@{/appointments/{id}(id=${a.id})}"
                                   class="btn btn-sm btn-outline-primary me-1"
                                   title="View details">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <!-- SCHEDULED-only actions -->
                                <span th:if="${a.status.name() == 'SCHEDULED'}">
                                    <!-- Edit -->
                                    <a th:href="@{/appointments/{id}/edit(id=${a.id})}"
                                       class="btn btn-sm btn-outline-secondary me-1"
                                       title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>

                                    <!-- Complete -->
                                    <form th:action="@{/appointments/{id}/complete(id=${a.id})}"
                                          method="post" class="d-inline me-1">
                                        <input type="hidden" name="returnUrl" value="/appointments">
                                        <button type="submit" class="btn btn-sm btn-outline-success"
                                                th:disabled="${a.balanceDue.signum() > 0}"
                                                th:title="${a.balanceDue.signum() > 0} ? 'Clear the balance due before completing' : 'Mark Completed'"
                                                onclick="return confirm('Mark this appointment as completed?')">
                                            <i class="bi bi-check-circle"></i>
                                        </button>
                                    </form>

                                    <!-- No-Show -->
                                    <form th:action="@{/appointments/{id}/no-show(id=${a.id})}"
                                          method="post" class="d-inline me-1">
                                        <input type="hidden" name="returnUrl" value="/appointments">
                                        <button type="submit" class="btn btn-sm btn-outline-warning"
                                                title="Mark No-Show"
                                                onclick="return confirm('Mark this appointment as no-show?')">
                                            <i class="bi bi-person-x"></i>
                                        </button>
                                    </form>

                                    <!-- Cancel (opens modal for reason) -->
                                    <button type="button"
                                            class="btn btn-sm btn-outline-danger"
                                            title="Cancel"
                                            data-bs-toggle="modal"
                                            data-bs-target="#cancelModal"
                                            th:attr="data-id=${a.id},
                                                     data-patient=${a.patient.fullName},
                                                     data-datetime=${#temporals.format(a.appointmentDateTime,'dd MMM yyyy HH:mm')}">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="text-muted small" th:text="${appointments.totalElements} + ' appointment(s) total'"></span>
            <div class="d-flex align-items-center gap-2">
                <select class="form-select form-select-sm" style="width:auto;"
                        onchange="location.href=this.value">
                    <option th:each="s : ${ {10,20,50,100} }"
                            th:value="@{/appointments(patientName=${selectedPatientName},therapistId=${selectedTherapistId},status=${selectedStatus},dateFrom=${selectedDateFrom},dateTo=${selectedDateTo},size=${s},page=0)}"
                            th:selected="${s == appointments.size}"
                            th:text="${s} + ' / page'">
                    </option>
                </select>
                <span th:if="${appointments.totalPages > 1}" class="text-muted small"
                      th:text="'Page ' + (${appointments.number} + 1) + ' of ' + ${appointments.totalPages}">
                </span>
                <div th:if="${appointments.totalPages > 1}" class="btn-group btn-group-sm">
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!appointments.hasPrevious()} ? 'disabled'"
                       th:href="@{/appointments(patientName=${selectedPatientName},therapistId=${selectedTherapistId},status=${selectedStatus},dateFrom=${selectedDateFrom},dateTo=${selectedDateTo},size=${appointments.size},page=${appointments.number - 1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!appointments.hasNext()} ? 'disabled'"
                       th:href="@{/appointments(patientName=${selectedPatientName},therapistId=${selectedTherapistId},status=${selectedStatus},dateFrom=${selectedDateFrom},dateTo=${selectedDateTo},size=${appointments.size},page=${appointments.number + 1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Cancel Appointment Modal -->
<div class="modal fade" id="cancelModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title">
                    <i class="bi bi-x-circle text-danger me-2"></i>Cancel Appointment
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="cancelForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="returnUrl" value="/appointments">
                <div class="modal-body">
                    <p class="mb-2 text-muted small" id="cancelModalBody">
                        Cancel this appointment?
                    </p>
                    <label class="form-label fw-semibold">Reason <span class="text-muted fw-normal">(optional)</span></label>
                    <textarea name="cancelReason" class="form-control" rows="2"
                              placeholder="Patient cancelled, rescheduled, etc."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">Back</button>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-x-circle me-1"></i>Confirm Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script>
document.getElementById('cancelModal').addEventListener('show.bs.modal', function(e) {
    const btn = e.relatedTarget;
    document.getElementById('cancelForm').action =
        '/appointments/' + btn.dataset.id + '/cancel';
    document.getElementById('cancelModalBody').textContent =
        'Cancel appointment for ' + btn.dataset.patient +
        ' on ' + btn.dataset.datetime + '?';
});
</script>

<!-- Live name/phone autocomplete for the patient filter box -->
<script>
    const patientNameFilterInput = document.getElementById('patientNameFilterInput');
    const patientFilterSuggestions = document.getElementById('patientFilterSuggestions');
    let filterSearchDebounce = null;

    function hideFilterSuggestions() {
        patientFilterSuggestions.classList.add('d-none');
        patientFilterSuggestions.innerHTML = '';
    }

    function escFilterHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderFilterSuggestions(results) {
        if (!results.length) { hideFilterSuggestions(); return; }
        patientFilterSuggestions.innerHTML = results.map(p =>
            `<button type="button" class="list-group-item list-group-item-action" data-name="${escFilterHtml(p.fullName)}">
                <span class="fw-semibold">${escFilterHtml(p.fullName)}</span>
                <span class="text-muted small ms-2">${escFilterHtml(p.phone || '')}</span>
             </button>`
        ).join('');
        patientFilterSuggestions.classList.remove('d-none');
    }

    patientNameFilterInput.addEventListener('input', function () {
        const q = this.value.trim();
        clearTimeout(filterSearchDebounce);
        if (!q) { hideFilterSuggestions(); return; }
        filterSearchDebounce = setTimeout(() => {
            fetch('/patients/search?q=' + encodeURIComponent(q))
                .then(res => res.json())
                .then(renderFilterSuggestions)
                .catch(() => hideFilterSuggestions());
        }, 250);
    });

    patientFilterSuggestions.addEventListener('click', function (e) {
        const item = e.target.closest('[data-name]');
        if (!item) return;
        patientNameFilterInput.value = item.dataset.name;
        hideFilterSuggestions();
        patientNameFilterInput.form.submit();
    });

    document.addEventListener('click', function (e) {
        if (!patientNameFilterInput.contains(e.target) && !patientFilterSuggestions.contains(e.target)) {
            hideFilterSuggestions();
        }
    });

    patientNameFilterInput.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') hideFilterSuggestions();
    });
</script>
</body>
</html>
