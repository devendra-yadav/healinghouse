<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Combos')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <!-- Page header -->
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div class="d-flex align-items-center gap-2">
            <h4 class="section-header mb-0" th:text="${combo.name}"></h4>
            <span class="badge" th:classappend="${combo.active} ? 'bg-success' : 'bg-secondary'"
                  th:text="${combo.active} ? 'Active' : 'Inactive'">
            </span>
        </div>
        <div class="d-flex gap-2">
            <a th:if="${@perm.has('COMBOS','EDIT')}" th:href="@{/combos/{id}/edit(id=${combo.id})}"
               class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil me-1"></i>Edit Combo
            </a>
            <a th:href="@{/combos}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to Combos
            </a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-header py-2 fw-semibold">
            <i class="bi bi-boxes me-1"></i>Combo Details
        </div>
        <div class="card-body">
            <div class="row g-3 mb-2">
                <div class="col-md-6">
                    <table class="table table-sm table-borderless mb-0 small">
                        <tbody>
                            <tr>
                                <td class="text-muted ps-0" style="width:160px">
                                    <i class="bi bi-percent me-1"></i>Discount
                                </td>
                                <td>
                                    <span th:if="${combo.discountType == null or combo.discountType.name() == 'NONE'}"
                                          class="text-muted">No discount</span>
                                    <span th:if="${combo.discountType != null and combo.discountType.name() == 'PERCENTAGE'}"
                                          th:text="${#numbers.formatDecimal(combo.discountValue, 1, 2)} + '% off'"></span>
                                    <span th:if="${combo.discountType != null and combo.discountType.name() == 'FLAT'}"
                                          th:text="'₹ ' + ${#numbers.formatDecimal(combo.discountValue, 1, 2)} + ' flat off'"></span>
                                </td>
                            </tr>
                            <tr>
                                <td class="text-muted ps-0">
                                    <i class="bi bi-cash-coin me-1"></i>Original Price
                                </td>
                                <td th:text="|₹ ${#numbers.formatDecimal(comboService.computeOriginalPrice(combo), 1, 2)}|"></td>
                            </tr>
                            <tr>
                                <td class="text-muted ps-0">
                                    <i class="bi bi-cash-stack me-1"></i>Combo Price
                                </td>
                                <td class="fw-semibold" th:text="|₹ ${#numbers.formatDecimal(comboService.computeComboPrice(combo), 1, 2)}|"></td>
                            </tr>
                            <tr>
                                <td class="text-muted ps-0">
                                    <i class="bi bi-piggy-bank me-1"></i>Savings
                                </td>
                                <td>
                                    <span th:if="${comboService.computeComboPrice(combo).compareTo(comboService.computeOriginalPrice(combo)) < 0}"
                                          class="badge bg-success"
                                          th:text="|₹ ${#numbers.formatDecimal(comboService.computeOriginalPrice(combo).subtract(comboService.computeComboPrice(combo)), 1, 2)} off|"></span>
                                    <span th:unless="${comboService.computeComboPrice(combo).compareTo(comboService.computeOriginalPrice(combo)) < 0}"
                                          class="text-muted">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small mb-1"><i class="bi bi-card-text me-1"></i>Description</div>
                    <p class="mb-0" th:text="${combo.description ?: '—'}"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-header py-2 fw-semibold">
            <i class="bi bi-list-check me-1"></i>Included Items
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Name</th>
                            <th class="text-center">Qty</th>
                            <th class="text-end">Unit Price (₹)</th>
                            <th class="text-end">Line Total (₹)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${combo.serviceItems.empty and combo.productItems.empty}">
                            <td colspan="5" class="text-center text-muted py-3">No items in this combo.</td>
                        </tr>
                        <tr th:each="si : ${combo.serviceItems}">
                            <td><span class="badge bg-success bg-opacity-75">Service</span></td>
                            <td th:text="${si.service.name}"></td>
                            <td class="text-center" th:text="${si.quantity}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(si.service.price, 1, 2)}"></td>
                            <td class="text-end fw-semibold"
                                th:text="${#numbers.formatDecimal(si.service.price.multiply(new java.math.BigDecimal(si.quantity)), 1, 2)}"></td>
                        </tr>
                        <tr th:each="pi : ${combo.productItems}">
                            <td><span class="badge bg-info text-dark">Product</span></td>
                            <td th:text="${pi.product.name}"></td>
                            <td class="text-center" th:text="${pi.quantity}"></td>
                            <td class="text-end" th:text="${#numbers.formatDecimal(pi.product.price, 1, 2)}"></td>
                            <td class="text-end fw-semibold"
                                th:text="${#numbers.formatDecimal(pi.product.price.multiply(new java.math.BigDecimal(pi.quantity)), 1, 2)}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
