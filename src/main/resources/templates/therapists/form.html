<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Therapists')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/therapists}">Therapists</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">

            <!-- Owner tip -->
            <div class="alert alert-info py-2 mb-3">
                <i class="bi bi-info-circle me-2"></i>
                For <strong>Marcia Gomes Yadav</strong> (owner): leave Salary, Commission Rate,
                and Bonus fields blank — no payout calculation will apply.
            </div>

            <div class="card shadow-sm">
                <div class="card-header py-3">
                    <h5 class="mb-0" th:text="${pageTitle}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/therapists/save}" th:object="${therapist}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{active}"/>

                        <!-- Row 1: Name + Specialization -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{fullName}" class="form-control"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                       placeholder="e.g. Marcia Gomes Yadav"/>
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Specialization</label>
                                <input type="text" th:field="*{specialization}" class="form-control"
                                       placeholder="e.g. Massage Therapist, Acupuncturist"/>
                            </div>
                        </div>

                        <!-- Row 2: Phone + Email -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="tel" th:field="*{phone}" class="form-control"
                                       placeholder="optional"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="optional"/>
                            </div>
                        </div>

                        <hr class="my-4"/>
                        <h6 class="section-header mb-3">Payout Configuration <span class="text-muted fw-normal">(leave blank for owner)</span></h6>

                        <!-- Row 3: Salary + Commission -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Fixed Monthly Salary (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" th:field="*{fixedMonthlySalary}"
                                           class="form-control" step="0.01" min="0"
                                           placeholder="e.g. 15000"/>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Commission Rate</label>
                                <div class="input-group">
                                    <input type="number" th:field="*{commissionRate}"
                                           class="form-control" step="0.0001" min="0" max="1"
                                           placeholder="e.g. 0.10"/>
                                    <span class="input-group-text">decimal</span>
                                </div>
                                <div class="form-text">Enter as decimal — e.g. <code>0.10</code> = 10%</div>
                            </div>
                        </div>

                        <!-- Row 4: Bonus Threshold + Bonus Amount -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Performance Bonus Threshold</label>
                                <div class="input-group">
                                    <input type="number" th:field="*{performanceBonusThreshold}"
                                           class="form-control" min="1"
                                           placeholder="e.g. 100"/>
                                    <span class="input-group-text">services/month</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Performance Bonus Amount (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" th:field="*{performanceBonusAmount}"
                                           class="form-control" step="0.01" min="0"
                                           placeholder="e.g. 5000"/>
                                </div>
                            </div>
                        </div>

                        <!-- Notes -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Notes</label>
                            <textarea th:field="*{notes}" class="form-control"
                                      rows="2" placeholder="optional"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                            <a th:href="@{/therapists}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-hh">
                                <i class="bi bi-check-lg me-1"></i>Save Therapist
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
