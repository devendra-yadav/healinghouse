<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
    <!-- FullCalendar v6: single bundle, no separate CSS file needed -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        .fc-event { cursor: pointer; }
        .fc-daygrid-day.fc-day-today, .fc-timegrid-col.fc-day-today { background-color: var(--hh-green-pale); }

        #therapistSwitcher { min-width: 160px; }

        /* Mobile (≤576px): FullCalendar's default toolbar/grid text is sized for desktop —
           shrink it and let the toolbar wrap onto its own centered rows instead of squeezing
           prev/next/title/view-buttons into one cramped line. */
        @media (max-width: 576px) {
            #therapistSwitcher { flex: 1 1 auto; }

            .fc .fc-toolbar { flex-direction: column; align-items: stretch; gap: .5rem; }
            .fc .fc-toolbar-chunk { display: flex; justify-content: center; }
            .fc .fc-toolbar-title { font-size: 1.05rem; }
            .fc .fc-button { padding: .25rem .55rem; font-size: .8rem; }
            .fc .fc-col-header-cell-cushion { font-size: .75rem; }
            .fc .fc-timegrid-slot-label-cushion,
            .fc .fc-timegrid-axis-cushion { font-size: .7rem; }
            .fc .fc-event-title, .fc .fc-event-time { font-size: .7rem; }
            .fc .fc-list-event-title, .fc .fc-list-event-time,
            .fc .fc-list-day-text, .fc .fc-list-day-side-text { font-size: .82rem; }
            .fc .fc-daygrid-day-number { font-size: .78rem; }
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Therapists')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h4 class="section-header mb-0">
            <i class="bi bi-calendar3 me-1"></i>Calendar — <span th:text="${therapist.fullName}"></span>
        </h4>
        <div class="d-flex flex-wrap align-items-center gap-2">
            <label for="therapistSwitcher" class="form-label fw-semibold mb-0">Therapist:</label>
            <select id="therapistSwitcher" class="form-select form-select-sm"
                    onchange="window.location.href = '/therapists/' + this.value + '/calendar'">
                <option th:each="t : ${therapists}"
                        th:value="${t.id}"
                        th:text="${t.fullName}"
                        th:selected="${t.id == therapist.id}">
                </option>
            </select>
            <a th:href="@{/therapists/{id}(id=${therapist.id})}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div id="therapistCalendar"></div>
        </div>
    </div>

    <p class="text-muted small mt-2">
        <i class="bi bi-info-circle me-1"></i>
        Click an appointment to open it, or click an empty slot to start a new booking for
        <span th:text="${therapist.fullName}"></span> at that time.
    </p>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>

<script th:inline="javascript">
/*<![CDATA[*/
const THERAPIST_ID = /*[[${therapist.id}]]*/ 0;
/*]]>*/
</script>
<script>
function pad(n) { return String(n).padStart(2, '0'); }

// Local-time "yyyy-MM-ddTHH:mm" matching the appointment form's datetime-local input.
function toDateTimeParam(date) {
    return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate())
        + 'T' + pad(date.getHours()) + ':' + pad(date.getMinutes());
}

document.addEventListener('DOMContentLoaded', function () {
    const calendarEl = document.getElementById('therapistCalendar');
    // Below 576px, a 7-column time grid has no room to breathe — fall back to a
    // scrollable agenda list and move the view-switcher buttons to their own row.
    const isMobile = window.matchMedia('(max-width: 576px)').matches;

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: isMobile ? 'listWeek' : 'timeGridWeek',
        headerToolbar: isMobile
            ? { left: 'prev,next', center: 'title', right: 'today' }
            : { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
        footerToolbar: isMobile
            ? { center: 'timeGridDay,timeGridWeek,dayGridMonth,listWeek' }
            : false,
        height: 'auto',
        nowIndicator: true,
        events: function (fetchInfo, successCallback, failureCallback) {
            fetch('/appointments/calendar-feed?therapistId=' + THERAPIST_ID
                    + '&start=' + encodeURIComponent(fetchInfo.startStr)
                    + '&end=' + encodeURIComponent(fetchInfo.endStr))
                .then(function (res) { return res.json(); })
                .then(successCallback)
                .catch(failureCallback);
        },
        eventClick: function (info) {
            window.location.href = '/appointments/' + info.event.id;
        },
        dateClick: function (info) {
            window.location.href = '/appointments/new?therapistId=' + THERAPIST_ID
                    + '&appointmentDateTime=' + encodeURIComponent(toDateTimeParam(info.date));
        }
    });
    calendar.render();
});
</script>

</body>
</html>
