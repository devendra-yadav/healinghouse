<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Therapists')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-header mb-0">Therapists</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/therapists(showInactive=${!showInactive})}"
               th:classappend="${showInactive} ? 'btn-secondary' : 'btn-outline-secondary'"
               class="btn btn-sm">
                <i class="bi bi-eye-slash me-1"></i><span th:text="${showInactive} ? 'Showing Inactive' : 'Show Inactive'"></span>
            </a>
            <a th:href="@{/therapists/new}" class="btn btn-hh btn-sm">
                <i class="bi bi-person-plus me-1"></i>New Therapist
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Specialization</th>
                            <th>Phone</th>
                            <th class="text-end">Monthly Salary (₹)</th>
                            <th class="text-end">Commission</th>
                            <th class="text-end">Bonus Threshold</th>
                            <th class="text-end">Bonus Amount (₹)</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${therapists.empty}">
                            <td colspan="9" class="text-center text-muted py-4">No therapists found.</td>
                        </tr>
                        <tr th:each="t, stat : ${therapists}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td>
                                <span class="fw-semibold" th:text="${t.fullName}"></span>
                                <span th:if="${t.owner}"
                                      class="badge bg-success ms-1" title="Owner — no payout calculation">Owner</span>
                                <span th:if="${!t.active}" class="badge bg-secondary ms-1">Inactive</span>
                            </td>
                            <td th:text="${t.specialization ?: '—'}"></td>
                            <td th:text="${t.phone ?: '—'}"></td>
                            <td class="text-end"
                                th:text="${t.fixedMonthlySalary != null && t.fixedMonthlySalary.signum() > 0}
                                          ? |₹ ${#numbers.formatDecimal(t.fixedMonthlySalary, 1, 2)}| : '—'">
                            </td>
                            <td class="text-end"
                                th:text="${t.commissionRate != null && t.commissionRate.signum() > 0}
                                          ? |${#numbers.formatDecimal(t.commissionRate.movePointRight(2), 1, 2)}%| : '—'">
                            </td>
                            <td class="text-end"
                                th:text="${t.performanceBonusThreshold != null ? t.performanceBonusThreshold + ' services' : '—'}">
                            </td>
                            <td class="text-end"
                                th:text="${t.performanceBonusAmount != null && t.performanceBonusAmount.signum() > 0}
                                          ? |₹ ${#numbers.formatDecimal(t.performanceBonusAmount, 1, 2)}| : '—'">
                            </td>
                            <td class="text-center text-nowrap">
                                <a th:href="@{/therapists/{id}(id=${t.id})}"
                                   class="btn btn-sm btn-outline-secondary me-1" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/therapists/{id}/edit(id=${t.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:if="${!t.active}" th:action="@{/therapists/{id}/activate(id=${t.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-arrow-counterclockwise"></i>
                                    </button>
                                </form>
                                <button th:if="${t.active}" type="button" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal" data-bs-target="#deleteModal"
                                        th:attr="data-name=${t.fullName}, data-url=@{/therapists/{id}/delete(id=${t.id})}">
                                    <i class="bi bi-person-dash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="text-muted small" th:text="${therapists.totalElements} + ' therapist(s)'"></span>
            <div class="d-flex align-items-center gap-2">
                <select class="form-select form-select-sm" style="width:auto;"
                        onchange="location.href=this.value">
                    <option th:each="s : ${ {10,20,50,100} }"
                            th:value="@{/therapists(size=${s},page=0,showInactive=${showInactive})}"
                            th:selected="${s == therapists.size}"
                            th:text="${s} + ' / page'">
                    </option>
                </select>
                <span th:if="${therapists.totalPages > 1}" class="text-muted small"
                      th:text="'Page ' + (${therapists.number} + 1) + ' of ' + ${therapists.totalPages}">
                </span>
                <div th:if="${therapists.totalPages > 1}" class="btn-group btn-group-sm">
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!therapists.hasPrevious()} ? 'disabled'"
                       th:href="@{/therapists(size=${therapists.size},page=${therapists.number - 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!therapists.hasNext()} ? 'disabled'"
                       th:href="@{/therapists(size=${therapists.size},page=${therapists.number + 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Deactivate</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deleteModalBody">Are you sure?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">Deactivate</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script>
    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        document.getElementById('deleteModalBody').textContent =
            'Deactivate therapist "' + btn.dataset.name + '"?';
        document.getElementById('deleteForm').action = btn.dataset.url;
    });
</script>
</body>
</html>
