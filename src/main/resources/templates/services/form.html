<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Services')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/services}">Services</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header py-3">
                    <h5 class="mb-0" th:text="${pageTitle}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/services/save}" th:object="${service}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{active}"/>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Service Name <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="e.g. Swedish Massage 60 min"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <!-- Tags + Duration + Price -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Tags</label>
                                <div id="tagChips" class="d-flex flex-wrap gap-2 mb-2"></div>
                                <div class="position-relative">
                                    <div class="input-group">
                                        <input type="text" id="tagInput" class="form-control" autocomplete="off"
                                               placeholder="Type a tag…"/>
                                        <button type="button" id="tagAddBtn" class="btn btn-sm btn-outline-secondary">
                                            <i class="bi bi-plus-lg"></i>
                                        </button>
                                    </div>
                                    <div id="tagSuggestions" class="list-group position-absolute w-100 shadow-sm"
                                         style="z-index:1000; display:none;"></div>
                                </div>
                                <input type="hidden" name="tagNames" id="tagNamesHidden" th:value="${existingTagNames}"/>
                                <div class="form-text">Type a tag and press Enter or click the + button. New tags are created automatically.</div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Duration</label>
                                <div class="input-group">
                                    <input type="number" th:field="*{durationMinutes}"
                                           class="form-control" min="1" placeholder="e.g. 60"/>
                                    <span class="input-group-text">min</span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" th:field="*{price}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           step="0.01" min="0" placeholder="0.00"/>
                                </div>
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea th:field="*{description}" class="form-control"
                                      rows="3" placeholder="optional — brief description of the service"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                            <a th:href="@{/services}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-hh">
                                <i class="bi bi-check-lg me-1"></i>Save Service
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script th:src="@{/js/tag-input.js}"></script>
</body>
</html>
