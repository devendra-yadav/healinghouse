<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Services')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-header mb-0">Services / Treatments</h4>
        <a th:if="${@perm.has('SERVICES','CREATE')}" th:href="@{/services/new}" class="btn btn-hh btn-sm">
            <i class="bi bi-plus-lg me-1"></i>New Service
        </a>
    </div>

    <!-- Search + Tag filter -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
        <form th:action="@{/services}" method="get" class="d-flex gap-2">
            <input type="hidden" name="size" th:value="${services.size}"/>
            <input type="text" name="q" th:value="${q}" class="form-control form-control-sm"
                   placeholder="Search by name…" style="width:220px;"/>
            <button class="btn btn-sm btn-outline-secondary" type="submit">
                <i class="bi bi-search"></i>
            </button>
            <a th:if="${q}" th:href="@{/services}" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-x"></i>
            </a>
        </form>

        <div class="d-flex flex-wrap gap-1">
            <a th:href="@{/services(size=${services.size})}"
               th:classappend="${selectedTag == null} ? 'btn-success' : 'btn-outline-secondary'"
               class="btn btn-sm">All</a>
            <a th:each="t : ${allTags}"
               th:href="@{/services(tag=${t.name},size=${services.size})}"
               th:text="${t.name}"
               th:classappend="${t.name == selectedTag} ? 'btn-success' : 'btn-outline-secondary'"
               class="btn btn-sm">
            </a>
        </div>

        <a th:href="@{/services(q=${q},tag=${selectedTag},size=${services.size},showInactive=${!showInactive})}"
           th:classappend="${showInactive} ? 'btn-secondary' : 'btn-outline-secondary'"
           class="btn btn-sm ms-auto">
            <i class="bi bi-eye-slash me-1"></i><span th:text="${showInactive} ? 'Showing Inactive' : 'Show Inactive'"></span>
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Service Name</th>
                            <th>Tags</th>
                            <th class="text-end">Duration</th>
                            <th class="text-end">Price (₹)</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${services.empty}">
                            <td colspan="6" class="text-center text-muted py-4">No services found.</td>
                        </tr>
                        <tr th:each="s, stat : ${services}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td>
                                <span class="fw-semibold" th:text="${s.name}"></span>
                                <span th:if="${!s.active}" class="badge bg-secondary ms-1">Inactive</span>
                                <div th:if="${s.description}" class="text-muted small text-truncate"
                                     style="max-width:320px;" th:text="${s.description}"></div>
                            </td>
                            <td>
                                <span th:each="t : ${s.sortedTags}"
                                      class="badge rounded-pill bg-success bg-opacity-75 me-1"
                                      th:text="${t.name}"></span>
                                <span th:if="${s.sortedTags.empty}" class="text-muted">—</span>
                            </td>
                            <td class="text-end"
                                th:text="${s.durationMinutes != null ? s.durationMinutes + ' min' : '—'}"></td>
                            <td class="text-end fw-semibold"
                                th:text="${s.price != null} ? |₹ ${#numbers.formatDecimal(s.price, 1, 2)}| : '—'"></td>
                            <td class="text-center text-nowrap">
                                <a th:href="@{/services/{id}(id=${s.id})}"
                                   class="btn btn-sm btn-outline-secondary me-1" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:if="${@perm.has('SERVICES','EDIT')}" th:href="@{/services/{id}/edit(id=${s.id})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:if="${!s.active and @perm.has('SERVICES','DELETE')}" th:action="@{/services/{id}/activate(id=${s.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-arrow-counterclockwise"></i>
                                    </button>
                                </form>
                                <button th:if="${!s.active and @perm.has('SERVICES','APPROVE')}" type="button" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal" data-bs-target="#deletePermanentModal"
                                        th:attr="data-name=${s.name}, data-url=@{/services/{id}/delete-permanent(id=${s.id})}">
                                    <i class="bi bi-trash3-fill"></i>
                                </button>
                                <button th:if="${s.active and @perm.has('SERVICES','DELETE')}" type="button" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal" data-bs-target="#deleteModal"
                                        th:attr="data-name=${s.name}, data-url=@{/services/{id}/delete(id=${s.id})}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="text-muted small" th:text="${services.totalElements} + ' service(s)'"></span>
            <div class="d-flex align-items-center gap-2">
                <select class="form-select form-select-sm" style="width:auto;"
                        onchange="location.href=this.value">
                    <option th:each="s : ${ {10,20,50,100} }"
                            th:value="@{/services(q=${q},tag=${selectedTag},size=${s},page=0,showInactive=${showInactive})}"
                            th:selected="${s == services.size}"
                            th:text="${s} + ' / page'">
                    </option>
                </select>
                <span th:if="${services.totalPages > 1}" class="text-muted small"
                      th:text="'Page ' + (${services.number} + 1) + ' of ' + ${services.totalPages}">
                </span>
                <div th:if="${services.totalPages > 1}" class="btn-group btn-group-sm">
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!services.hasPrevious()} ? 'disabled'"
                       th:href="@{/services(q=${q},tag=${selectedTag},size=${services.size},page=${services.number - 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!services.hasNext()} ? 'disabled'"
                       th:href="@{/services(q=${q},tag=${selectedTag},size=${services.size},page=${services.number + 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Deactivate</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deleteModalBody">Are you sure?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">Deactivate</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Permanent Delete Confirmation Modal -->
<div class="modal fade" id="deletePermanentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Permanently Delete</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deletePermanentModalBody">Are you sure?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deletePermanentForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">Delete Permanently</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script>
    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        document.getElementById('deleteModalBody').textContent =
            'Deactivate service "' + btn.dataset.name + '"?';
        document.getElementById('deleteForm').action = btn.dataset.url;
    });
    document.getElementById('deletePermanentModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        document.getElementById('deletePermanentModalBody').textContent =
            'Permanently delete service "' + btn.dataset.name + '"? This cannot be undone.';
        document.getElementById('deletePermanentForm').action = btn.dataset.url;
    });
</script>
</body>
</html>
