<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Services')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <!-- Page header -->
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div class="d-flex align-items-center gap-2">
            <h4 class="section-header mb-0" th:text="${service.name}"></h4>
            <span class="badge" th:classappend="${service.active} ? 'bg-success' : 'bg-secondary'"
                  th:text="${service.active} ? 'Active' : 'Inactive'">
            </span>
        </div>
        <div class="d-flex gap-2">
            <a th:if="${@perm.has('SERVICES','EDIT')}" th:href="@{/services/{id}/edit(id=${service.id})}"
               class="btn btn-sm btn-outline-primary">
                <i class="bi bi-pencil me-1"></i>Edit Service
            </a>
            <a th:href="@{/services}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to Services
            </a>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-header py-2 fw-semibold">
            <i class="bi bi-clipboard2-pulse me-1"></i>Service Details
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <table class="table table-sm table-borderless mb-0 small">
                        <tbody>
                            <tr>
                                <td class="text-muted ps-0" style="width:160px">
                                    <i class="bi bi-hourglass-split me-1"></i>Duration
                                </td>
                                <td th:text="${service.durationMinutes != null ? service.durationMinutes + ' min' : '—'}"></td>
                            </tr>
                            <tr>
                                <td class="text-muted ps-0">
                                    <i class="bi bi-cash-coin me-1"></i>Price
                                </td>
                                <td class="fw-semibold"
                                    th:text="${service.price != null} ? |₹ ${#numbers.formatDecimal(service.price, 1, 2)}| : '—'"></td>
                            </tr>
                            <tr>
                                <td class="text-muted ps-0 align-top">
                                    <i class="bi bi-tags me-1"></i>Tags
                                </td>
                                <td>
                                    <span th:each="t : ${service.sortedTags}"
                                          class="badge rounded-pill bg-success bg-opacity-75 me-1"
                                          th:text="${t.name}"></span>
                                    <span th:if="${service.sortedTags.empty}" class="text-muted">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="col-md-6">
                    <div class="text-muted small mb-1"><i class="bi bi-card-text me-1"></i>Description</div>
                    <p class="mb-0" th:text="${service.description ?: '—'}"></p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
