<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Patients')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">
    <th:block th:replace="~{fragments/layout :: alerts}"/>

    <!-- Heading + New button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="section-header mb-0">Patients</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/patients(q=${q},showInactive=${!showInactive})}"
               th:classappend="${showInactive} ? 'btn-secondary' : 'btn-outline-secondary'"
               class="btn btn-sm">
                <i class="bi bi-eye-slash me-1"></i><span th:text="${showInactive} ? 'Showing Inactive' : 'Show Inactive'"></span>
            </a>
            <a th:if="${@perm.has('PATIENTS','CREATE')}" th:href="@{/patients/new}" class="btn btn-hh btn-sm">
                <i class="bi bi-person-plus me-1"></i>New Patient
            </a>
        </div>
    </div>

    <!-- Search -->
    <form th:action="@{/patients}" method="get" class="mb-3">
        <input type="hidden" name="size" th:value="${patients.size}"/>
        <div class="position-relative" style="max-width:400px;">
            <div class="input-group">
                <input type="text" name="q" id="patientSearchInput" th:value="${q}"
                       class="form-control" autocomplete="off"
                       placeholder="Search by name or phone…"/>
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:if="${q}" th:href="@{/patients}" class="btn btn-outline-danger">
                    <i class="bi bi-x"></i>
                </a>
            </div>
            <div id="patientSuggestions"
                 class="list-group position-absolute w-100 shadow-sm d-none"
                 style="z-index:1000; top:100%;"></div>
        </div>
    </form>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Phone</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Email</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${patients.empty}">
                            <td colspan="7" class="text-center text-muted py-4">No patients found.</td>
                        </tr>
                        <tr th:each="p, stat : ${patients}">
                            <td class="text-muted" th:text="${stat.count}"></td>
                            <td class="fw-semibold">
                                <span th:text="${p.fullName}"></span>
                                <span th:if="${!p.active}" class="badge bg-secondary ms-1">Inactive</span>
                            </td>
                            <td th:text="${p.phone ?: '—'}"></td>
                            <td th:text="${p.age != null ? p.age + ' yrs' : '—'}"></td>
                            <td th:text="${p.gender != null ? #strings.capitalize(#strings.toLowerCase(p.gender.name())) : '—'}"></td>
                            <td th:text="${p.email ?: '—'}"></td>
                            <td class="text-center text-nowrap">
                                <a th:href="@{/patients/{id}(id=${p.id})}"
                                   class="btn btn-sm btn-outline-secondary me-1" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:if="${@perm.has('PATIENTS','EDIT')}" th:href="@{/patients/{id}/edit(id=${p.id})}"
                                   class="btn btn-sm btn-outline-primary me-1" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:if="${!p.active and @perm.has('PATIENTS','DELETE')}" th:action="@{/patients/{id}/activate(id=${p.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-success">
                                        <i class="bi bi-arrow-counterclockwise"></i>
                                    </button>
                                </form>
                                <button th:if="${p.active and @perm.has('PATIENTS','DELETE')}" type="button" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal" data-bs-target="#deleteModal"
                                        th:attr="data-name=${p.fullName}, data-url=@{/patients/{id}/delete(id=${p.id})}">
                                    <i class="bi bi-person-dash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
            <span class="text-muted small" th:text="${patients.totalElements} + ' patient(s) found'"></span>
            <div class="d-flex align-items-center gap-2">
                <select class="form-select form-select-sm" style="width:auto;"
                        onchange="location.href=this.value">
                    <option th:each="s : ${ {10,20,50,100} }"
                            th:value="@{/patients(q=${q},size=${s},page=0,showInactive=${showInactive})}"
                            th:selected="${s == patients.size}"
                            th:text="${s} + ' / page'">
                    </option>
                </select>
                <span th:if="${patients.totalPages > 1}" class="text-muted small"
                      th:text="'Page ' + (${patients.number} + 1) + ' of ' + ${patients.totalPages}">
                </span>
                <div th:if="${patients.totalPages > 1}" class="btn-group btn-group-sm">
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!patients.hasPrevious()} ? 'disabled'"
                       th:href="@{/patients(q=${q},size=${patients.size},page=${patients.number - 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                    <a class="btn btn-outline-secondary"
                       th:classappend="${!patients.hasNext()} ? 'disabled'"
                       th:href="@{/patients(q=${q},size=${patients.size},page=${patients.number + 1},showInactive=${showInactive})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Deactivate</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="deleteModalBody">
                Are you sure you want to deactivate this patient?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">Deactivate</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
<script>
    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        document.getElementById('deleteModalBody').textContent =
            'Deactivate patient "' + btn.dataset.name + '"?';
        document.getElementById('deleteForm').action = btn.dataset.url;
    });
</script>

<!-- Live name/phone autocomplete for the patient search box -->
<script th:inline="javascript">
    const patientSearchInput = document.getElementById('patientSearchInput');
    const patientSuggestions = document.getElementById('patientSuggestions');
    const patientDetailBaseUrl = /*[[@{/patients/}]]*/ '/patients/';
    let searchDebounce = null;

    function hideSuggestions() {
        patientSuggestions.classList.add('d-none');
        patientSuggestions.innerHTML = '';
    }

    function renderSuggestions(results) {
        if (!results.length) { hideSuggestions(); return; }
        patientSuggestions.innerHTML = results.map(p =>
            `<a href="${patientDetailBaseUrl}${p.id}" class="list-group-item list-group-item-action">
                <span class="fw-semibold">${escHtml(p.fullName)}</span>
                <span class="text-muted small ms-2">${escHtml(p.phone || '')}</span>
             </a>`
        ).join('');
        patientSuggestions.classList.remove('d-none');
    }

    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    patientSearchInput.addEventListener('input', function () {
        const q = this.value.trim();
        clearTimeout(searchDebounce);
        if (!q) { hideSuggestions(); return; }
        searchDebounce = setTimeout(() => {
            fetch('/patients/search?q=' + encodeURIComponent(q))
                .then(res => res.json())
                .then(renderSuggestions)
                .catch(() => hideSuggestions());
        }, 250);
    });

    document.addEventListener('click', function (e) {
        if (!patientSearchInput.contains(e.target) && !patientSuggestions.contains(e.target)) {
            hideSuggestions();
        }
    });

    patientSearchInput.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') hideSuggestions();
    });
</script>
</body>
</html>
