<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">

<!-- ═══════════════════════════════════════════
     FRAGMENT: head
     Usage: <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
     ═══════════════════════════════════════════ -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Healing House Clinic'">Healing House Clinic</title>

    <!-- CSRF token, exposed for JS-driven fetch() calls (e.g. calendar drag/resize/cancel) that
         can't use Thymeleaf's automatic hidden-field injection on a real <form> -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Clinic theme -->
    <link rel="stylesheet" th:href="@{/css/clinic.css}"/>
</head>

<!-- ═══════════════════════════════════════════
     FRAGMENT: navbar
     Usage: <nav th:replace="~{fragments/layout :: navbar(${pageTitle})}"/>
     ═══════════════════════════════════════════ -->
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark navbar-hh shadow-sm">
    <div class="container-fluid px-4">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-flower3 me-2"></i>Healing House Clinic
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Dashboard'} ? 'active'"
                       th:href="@{/}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('PATIENTS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Patients'} ? 'active'"
                       th:href="@{/patients}">
                        <i class="bi bi-people me-1"></i>Patients
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('THERAPISTS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Therapists'} ? 'active'"
                       th:href="@{/therapists}">
                        <i class="bi bi-person-badge me-1"></i>Therapists
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('SERVICES','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Services'} ? 'active'"
                       th:href="@{/services}">
                        <i class="bi bi-clipboard2-heart me-1"></i>Services
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('PRODUCTS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Products'} ? 'active'"
                       th:href="@{/products}">
                        <i class="bi bi-bag-heart me-1"></i>Products
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('TAGS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Tags'} ? 'active'"
                       th:href="@{/tags}">
                        <i class="bi bi-tags me-1"></i>Tags
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('COMBOS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Combos'} ? 'active'"
                       th:href="@{/combos}">
                        <i class="bi bi-boxes me-1"></i>Combos
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('PACKAGE_TEMPLATES','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'PackageTemplates'} ? 'active'"
                       th:href="@{/package-templates}">
                        <i class="bi bi-collection me-1"></i>Packages
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('APPOINTMENTS','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Appointments'} ? 'active'"
                       th:href="@{/appointments}">
                        <i class="bi bi-calendar2-check me-1"></i>Appointments
                    </a>
                </li>
                <li class="nav-item" th:if="${@perm.has('REPORTS_STANDARD','VIEW')}">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Reports'} ? 'active'"
                       th:href="@{/reports}">
                        <i class="bi bi-bar-chart-line me-1"></i>Reports
                    </a>
                </li>
                <li class="nav-item dropdown" th:if="${@perm.has('USER_MANAGEMENT','VIEW') or @perm.has('ACCESS_MATRIX','VIEW')}">
                    <a class="nav-link dropdown-toggle"
                       th:classappend="${activePage == 'UserManagement' or activePage == 'AccessMatrix'} ? 'active'"
                       href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li th:if="${@perm.has('USER_MANAGEMENT','VIEW')}">
                            <a class="dropdown-item" th:href="@{/admin/users}">
                                <i class="bi bi-people me-1"></i>User Management
                            </a>
                        </li>
                        <li th:if="${@perm.has('ACCESS_MATRIX','VIEW')}">
                            <a class="dropdown-item" th:href="@{/admin/access-matrix}">
                                <i class="bi bi-grid-3x3 me-1"></i>Access Matrix
                            </a>
                        </li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       th:classappend="${activePage == 'Help'} ? 'active'"
                       th:href="@{/help}">
                        <i class="bi bi-question-circle me-1"></i>Help
                    </a>
                </li>
                <li class="nav-item d-flex align-items-center ms-lg-3">
                    <span class="navbar-text text-white-50 me-2 small" sec:authentication="name">user</span>
                    <a class="btn btn-sm btn-outline-light me-2" th:href="@{/account/change-password}" title="Change Password">
                        <i class="bi bi-key"></i>
                    </a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-light">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ═══════════════════════════════════════════
     FRAGMENT: footer
     Usage: <footer th:replace="~{fragments/layout :: footer}"/>
     ═══════════════════════════════════════════ -->
<footer th:fragment="footer" class="py-3 mt-auto text-center">
    <div class="container">
        <span>&copy; 2026 Healing House Clinic &mdash; All rights reserved.</span>
    </div>
</footer>

<!-- ═══════════════════════════════════════════
     FRAGMENT: scripts
     Usage: <th:block th:replace="~{fragments/layout :: scripts}"/>
     ═══════════════════════════════════════════ -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

<!-- ═══════════════════════════════════════════
     FRAGMENT: alerts
     Usage: <th:block th:replace="~{fragments/layout :: alerts}"/>
     ═══════════════════════════════════════════ -->
<th:block th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</th:block>

</html>
