<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar('Products')}"></nav>

<main class="container-fluid px-4 py-4 flex-grow-1">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header py-3">
                    <h5 class="mb-0" th:text="${pageTitle}"></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{active}"/>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Product Name <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   placeholder="e.g. Detox Herbal Tea 50g"/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <!-- Category + Price -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category</label>
                                <select th:field="*{category}" class="form-select">
                                    <option value="">— Select Category —</option>
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" th:field="*{price}" class="form-control"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                           step="0.01" min="0" placeholder="0.00"/>
                                </div>
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                        </div>

                        <!-- Stock + Reorder Level -->
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Stock Quantity</label>
                                <input type="number" th:field="*{stockQuantity}" class="form-control"
                                       min="0" placeholder="0"/>
                                <div class="form-text">Current units available in stock.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Reorder Level</label>
                                <input type="number" th:field="*{reorderLevel}" class="form-control"
                                       min="0" placeholder="5"/>
                                <div class="form-text">Show low-stock alert when stock falls to this level.</div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea th:field="*{description}" class="form-control"
                                      rows="3" placeholder="optional — ingredients, usage, benefits…"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-2 justify-content-end border-top pt-3">
                            <a th:href="@{/products}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-hh">
                                <i class="bi bi-check-lg me-1"></i>Save Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"/>
</body>
</html>
