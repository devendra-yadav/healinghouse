<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow-sm" style="width: 100%; max-width: 380px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-key-fill text-primary" style="font-size: 2.5rem;"></i>
                <h4 class="mt-2 mb-0">Change Password</h4>
                <small class="text-muted">Choose a new password for your account</small>
            </div>

            <th:block th:replace="~{fragments/layout :: alerts}"></th:block>
            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <a th:if="${successMessage}" th:href="@{/}" class="btn btn-primary w-100">
                <i class="bi bi-arrow-right-circle me-1"></i>Continue
            </a>

            <form th:unless="${successMessage}" th:action="@{/account/change-password}" th:object="${changePasswordForm}" method="post">
                <div class="mb-3">
                    <label for="currentPassword" class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="currentPassword"
                           th:field="*{currentPassword}" required/>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword"
                           th:field="*{newPassword}" minlength="8" required/>
                    <small class="text-muted">At least 8 characters.</small>
                </div>
                <div class="mb-3">
                    <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmNewPassword"
                           th:field="*{confirmNewPassword}" minlength="8" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check2 me-1"></i>Change Password
                </button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
